<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurros | Historias Anónimas</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/ff0050/ffffff?text=S">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --p: #ff0050; --bg: #000; --txt: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* FEED TIKTOK */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .card { 
            height: 100vh; width: 100vw; scroll-snap-align: start;
            position: relative; overflow: hidden; background: #000;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; opacity: 0.8; }
        
        /* Overlay oscuro degradado profundo para lectura */
        .card::after {
            content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 75%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0) 100%);
            z-index: 2; pointer-events: none;
        }

        /* CONTENIDO DE HISTORIA */
        .content { 
            position: relative; z-index: 3; 
            padding: 25px 85px 100px 20px; 
            width: 100%; max-height: 65vh; text-align: left; 
        }
        .city-tag { font-size: 0.8rem; font-weight: 800; color: var(--p); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .confession-scroll {
            max-height: 45vh; overflow-y: auto; padding-right: 8px; pointer-events: auto;
        }
        /* Ocultar scrollbar pero permitir scroll */
        .confession-scroll::-webkit-scrollbar { width: 0; background: transparent; }

        .confession-text { 
            font-size: 1.15rem; font-weight: 500; line-height: 1.5; color: #fff; 
            text-shadow: 0 2px 10px rgba(0,0,0,1); word-wrap: break-word; word-break: break-word;
        }

        /* ACCIONES LATERALES */
        .side-bar { position: absolute; right: 12px; bottom: 130px; z-index: 10; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .btn-action { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .circle { 
            width: 52px; height: 52px; background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); transition: 0.1s;
        }
        .circle:active { transform: scale(0.8); }
        .count { font-size: 0.75rem; margin-top: 5px; font-weight: bold; }

        /* MODALES */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; padding: 25px; z-index: 1000; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        textarea { width: 100%; background: #111; color: #fff; border: 1px solid #333; border-radius: 20px; padding: 20px; font-size: 1.1rem; resize: none; margin-bottom: 5px; }
        textarea:focus { border-color: var(--p); outline: none; }

        .btn-pub { background: var(--p); color: #fff; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn-disabled { background: #333; color: #777; cursor: not-allowed; }
        
        .fab { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: #fff; width: 60px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 100; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .fab::before { content: '+'; color: #000; font-size: 2.2rem; font-weight: bold; }

        /* REPORTE OPCIONES */
        .report-option { background: #111; padding: 18px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        .report-option.selected { border-color: var(--p); background: rgba(255,0,80,0.1); }

        /* CORAZÓN ANIMADO */
        .heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: white; font-size: 8rem; z-index: 100; pointer-events: none; animation: popHeart 0.6s ease-out; opacity: 0; }
        @keyframes popHeart { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.9; } 100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; } }
    </style>
</head>
<body>

<div id="feed">
    <div class="card"><div class="content"><div class="confession-text">Cargando historias...</div></div></div>
</div>

<button class="fab" onclick="toggleM('pub', true)"></button>

<div id="modal-pub" class="full-modal">
    <div class="modal-header">
        <span onclick="toggleM('pub', false)" style="color:#888; cursor: pointer;">Cerrar</span>
        <button class="btn-pub" onclick="publishNow()">Publicar</button>
    </div>
    <textarea id="in-text" style="height: 250px;" maxlength="1000" placeholder="Cuenta tu historia anónimamente..." oninput="updatePubCount()"></textarea>
    <div id="pub-char-val" style="text-align:right; font-size:0.8rem; color:#555; margin-bottom:20px;">0/1000</div>
    
    <label style="background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 1px dashed #444; cursor: pointer; display: block; color: #888;">
        <span id="img-status">📸 Añadir imagen de fondo</span>
        <input type="file" id="in-img" accept="image/*" style="display:none" onchange="document.getElementById('img-status').innerText='✅ Imagen cargada'">
    </label>
</div>

<div id="modal-rep" class="full-modal">
    <div class="modal-header">
        <span onclick="toggleM('rep', false)" style="color:#888; cursor: pointer;">Atrás</span>
        <button id="btn-submit-report" class="btn-pub btn-disabled" onclick="submitFinalReport()" disabled>Enviar</button>
    </div>
    <h2 style="margin-bottom:15px; font-size:1.4rem">Reportar contenido</h2>
    <div id="report-categories">
        <div class="report-option" onclick="selectCat(this, 'Odio/Violencia')">Odio o Violencia</div>
        <div class="report-option" onclick="selectCat(this, 'Acoso')">Acoso Personal</div>
        <div class="report-option" onclick="selectCat(this, 'Contenido Sexual')">Contenido Sexual</div>
        <div class="report-option" onclick="selectCat(this, 'Spam')">Spam / Estafa</div>
    </div>
    <textarea id="report-desc" style="height: 120px; margin-top:15px" placeholder="Describe por qué es ofensivo (mín. 15 caracteres)..." oninput="validateReport()"></textarea>
</div>

<script>
    // --- IMPORTANTE: CONFIGURA TUS LLAVES ---
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co"; 
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = window.supabase.createClient(S_URL, S_KEY);

    let lastC = 0;
    let postToReport = null;
    let selectedCategory = null;

    // CARGAR FEED
    async function fetchF() {
        const { data, error } = await _sb.from('confessions').select('*').eq('is_hidden', false).order('created_at', { ascending: false });
        if (error) return;
        const fEl = document.getElementById('feed');
        if (!data || data.length === 0) {
            fEl.innerHTML = '<div class="card"><div class="content"><div class="confession-text">¡Súper vacío! Sé el primero en contar algo.</div></div></div>';
            return;
        }
        fEl.innerHTML = data.map(p => `
            <div class="card" onclick="handleInt(event, '${p.id}')">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-image">` : ''}
                <div class="content">
                    <div class="city-tag">📍 ${p.city || 'Anónimo'}</div>
                    <div class="confession-scroll">
                        <div class="confession-text">${p.text}</div>
                    </div>
                </div>
                <div class="side-bar">
                    <div class="btn-action" onclick="sendL('${p.id}')">
                        <div class="circle">❤️</div>
                        <span class="count" id="l-${p.id}">${p.likes || 0}</span>
                    </div>
                    <div class="btn-action" onclick="viralS('${p.text.replace(/'/g, "\\'").substring(0, 80)}')">
                        <div class="circle" style="font-size:1.3rem">🔗</div>
                        <span class="count">Enviar</span>
                    </div>
                    <div class="btn-action" onclick="openReport('${p.id}')">
                        <div class="circle" style="font-size:1rem; opacity:0.3">⚠️</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // INTERACCION
    function handleInt(e, id) {
        const t = Date.now();
        if ((t - lastC) < 300) { 
            const h = document.createElement('div'); h.className = 'heart-pop'; h.innerHTML = '❤️';
            e.currentTarget.appendChild(h); setTimeout(() => h.remove(), 600);
            sendL(id); 
        }
        lastC = t;
    }

    // PUBLICAR
    async function publishNow() {
        const txt = document.getElementById('in-text').value.trim();
        const file = document.getElementById('in-img').files[0];
        if(!txt) return;
        
        let url = null;
        if(file) {
            const n = `${Date.now()}.png`;
            const { data } = await _sb.storage.from('confession-images').upload(n, file);
            if(data) url = _sb.storage.from('confession-images').getPublicUrl(n).data.publicUrl;
        }

        let city = "Algún lugar";
        try { const r = await fetch('https://ipapi.co/json/'); const g = await r.json(); city = g.city || "Cerca"; } catch(e) {}
        
        await _sb.from('confessions').insert([{ text: txt, image_url: url, city: city }]);
        toggleM('pub', false); fetchF();
    }

    // LIKES
    async function sendL(id) {
        await _sb.rpc('increment_likes', { row_id: id });
        const c = document.getElementById(`l-${id}`);
        if(c) c.innerText = parseInt(c.innerText) + 1;
    }

    // REPORTE LÓGICA
    function openReport(id) { postToReport = id; toggleM('rep', true); }
    function selectCat(el, cat) { 
        document.querySelectorAll('.report-option').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected'); selectedCategory = cat; validateReport(); 
    }
    function validateReport() {
        const desc = document.getElementById('report-desc').value.trim();
        const btn = document.getElementById('btn-submit-report');
        btn.disabled = !(selectedCategory && desc.length >= 15);
        btn.classList.toggle('btn-disabled', btn.disabled);
    }
    async function submitFinalReport() {
        const desc = document.getElementById('report-desc').value.trim();
        await _sb.from('reports').insert([{ confession_id: postToReport, reason: `[${selectedCategory}] ${desc}` }]);
        alert("Contenido reportado. La comunidad lo ocultará tras 10 reportes."); 
        toggleM('rep', false); fetchF();
    }

    // VIRALIDAD
    async function viralS(t) {
        const d = { title: 'Susurros', text: `Escucha esto: "${t}..."`, url: window.location.href };
        if (navigator.share) await navigator.share(d);
        else alert("¡Link copiado!");
    }

    function updatePubCount() { document.getElementById('pub-char-val').innerText = `${document.getElementById('in-text').value.length}/1000`; }
    function toggleM(type, s) { document.getElementById(`modal-${type}`).style.display = s ? 'flex' : 'none'; }

    fetchF();
</script>
</body>
</html>
