<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurros | Premium UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --p: #ff0050; 
            --bg: #050505; 
            --txt: #ffffff; 
            --cyan: #25f4ee; 
            --glass: rgba(255, 255, 255, 0.08);
            --card-bg: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--txt); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            height: 100%; 
        }

        /* --- FEED TIKTOK STYLE --- */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }

        .card { 
            height: 100vh; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            background: var(--card-bg);
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        .bg-img { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            opacity: 0.6;
            filter: brightness(0.8);
        }

        .card::after { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%, rgba(0,0,0,0.4) 100%); 
            z-index: 2; 
        }

        /* --- CONTENIDO DEL POST --- */
        .ui-layer { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            z-index: 3; 
            padding: 30px 90px 150px 25px; 
            pointer-events: none; 
        }
        
        .ui-layer * { pointer-events: auto; }

        .author-box { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .author { font-weight: 800; font-size: 1.1rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .city-tag { 
            display: inline-block;
            background: var(--glass);
            backdrop-filter: blur(5px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .text { 
            font-size: 1.5rem; 
            line-height: 1.3; 
            font-weight: 700; 
            text-wrap: balance;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
        }

        /* --- BARRA LATERAL ACCIONES --- */
        .side-bar { 
            position: absolute; 
            right: 15px; 
            bottom: 150px; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 22px; 
            align-items: center; 
        }

        .action-item { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .action-item:active { transform: scale(0.9); }

        .btn-circle { 
            width: 54px; 
            height: 54px; 
            background: var(--glass); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.6rem; 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-circle.like-active { color: var(--p); border-color: var(--p); }

        .label { font-size: 0.75rem; font-weight: 700; margin-top: 6px; text-shadow: 0 2px 4px #000; }

        /* --- BOTÓN FLOTANTE (+) --- */
        .fab { 
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 60px; 
            height: 60px; 
            background: #fff; 
            border-radius: 50%; 
            border: none; 
            z-index: 100; 
            font-size: 2rem; 
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255,0,80,0.4), 0 8px 20px rgba(0,0,0,0.5);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:active { transform: translateX(-50%) scale(1.1) rotate(90deg); }

        /* --- MODALES Y DRAWERS (DISEÑO GLASS) --- */
        .modal, .drawer { 
            position: fixed; 
            inset: 0; 
            z-index: 2000; 
            display: none; 
            flex-direction: column; 
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            padding: 30px 25px;
        }

        .drawer { 
            top: auto; bottom: 0; height: 75vh; 
            border-radius: 30px 30px 0 0; 
            transform: translateY(100%); 
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .drawer.active { transform: translateY(0); }

        /* --- INPUTS --- */
        textarea, input[type="text"] { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 18px; 
            color: #fff; 
            padding: 15px; 
            font-size: 1rem; 
            outline: none;
            width: 100%;
        }
        textarea:focus { border-color: var(--p); }

        .btn-pub { 
            background: var(--p); 
            color: #fff; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 30px; 
            font-weight: 800; 
            font-size: 1rem;
        }

        /* --- PERFIL GRID --- */
        .profile-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 2px; 
            margin-top: 20px; 
        }
        .grid-sq { aspect-ratio: 1/1; background: #111; border: 0.1px solid #222; }

    </style>
</head>
<body>

<div id="feed"></div>

<button class="fab" onclick="toggleM('pub', true)">+</button>

<div id="modal-pub" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <span onclick="toggleM('pub', false)" style="font-weight:bold; color:#888;">Cerrar</span>
        <button onclick="publish()" id="btn-pub" class="btn-pub">Publicar</button>
    </div>
    <div class="city-tag" style="margin-bottom:15px; align-self:start;">📍 Ubicación Automática</div>
    <textarea id="post-text" placeholder="Suelta ese secreto aquí..." rows="6"></textarea>
    
    <label style="margin-top:20px; display:flex; flex-direction:column; align-items:center; border: 2px dashed rgba(255,255,255,0.1); padding:40px; border-radius:20px; cursor:pointer;">
        <span id="img-name" style="font-size:0.9rem; color:#666;">Añadir una foto de fondo</span>
        <input type="file" id="post-img" hidden accept="image/*" onchange="document.getElementById('img-name').innerText='✅ Imagen cargada'">
    </label>
</div>

<div id="drawer-chat" class="drawer">
    <div style="width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:10px; margin:0 auto 20px;"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h3 style="font-weight:800;">Debate Anónimo</h3>
        <span onclick="toggleD(false)" style="color:#555;">Cerrar</span>
    </div>
    <div id="replies-list" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
    <div style="display:flex; gap:10px; padding-bottom:10px;">
        <input type="text" id="reply-in" placeholder="Dile algo...">
        <button onclick="postReply()" style="color:var(--p); font-weight:800; background:none; border:none;">POST</button>
    </div>
</div>

<div id="modal-profile" class="modal">
    <div style="text-align:center; margin-bottom:40px;">
        <div style="width:100px; height:100px; background:var(--glass); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:3rem; border:2px solid var(--p);">👤</div>
        <input type="text" id="alias-input" style="text-align:center; background:none; border:none; font-size:1.5rem; font-weight:800;" value="Susurro Anónimo">
        <p id="user-status" style="font-size:0.75rem; color:#444; margin-top:5px;">Toque para cambiar su alias</p>
        <button onclick="loginGoogle()" style="margin-top:20px; background:#fff; color:#000; border:none; padding:10px 20px; border-radius:30px; font-weight:bold; font-size:0.8rem;">Vincular con Google</button>
    </div>
    
    <div style="display:flex; border-bottom:1px solid #222;">
        <div class="tab" style="flex:1; text-align:center; padding:15px; border-bottom:2px solid var(--p); font-weight:800;">MIS SUSURROS</div>
    </div>
    <div id="profile-grid" class="profile-grid"></div>
    
    <button onclick="toggleM('profile', false)" style="margin-top:auto; padding:20px; color:#555; border:none; background:none;">Volver al Feed</button>
</div>

<script>
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = supabase.createClient(S_URL, S_KEY);

    let currentUserId = null, activePostId = null;
    let myAlias = localStorage.getItem('myAlias') || "Anónimo_" + Math.floor(Math.random()*999);

    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        currentUserId = session?.user?.id || null;
        document.getElementById('alias-input').value = myAlias;
        
        document.getElementById('alias-input').onchange = (e) => {
            myAlias = e.target.value;
            localStorage.setItem('myAlias', myAlias);
        };

        if(currentUserId) document.getElementById('user-status').innerText = "Cuenta Protegida ✅";

        loadFeed();
    }

    async function loadFeed() {
        const { data } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(p => `
            <div class="card">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img">` : ''}
                <div class="ui-layer">
                    <div class="author-box">
                        <span class="author">@${p.author_alias || 'Anónimo'}</span>
                        <span class="city-tag">📍 ${p.city || 'Desconocido'}</span>
                    </div>
                    <div class="text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="action-item" onclick="doLike('${p.id}')">
                        <div class="btn-circle">❤️</div>
                        <div class="label" id="l-${p.id}">${p.likes || 0}</div>
                    </div>
                    <div class="action-item" onclick="openChat('${p.id}')">
                        <div class="btn-circle">💬</div>
                        <div class="label">Hilos</div>
                    </div>
                    <div class="action-item" onclick="toggleM('profile', true)">
                        <div class="btn-circle">👤</div>
                        <div class="label">Tú</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function publish() {
        const txt = document.getElementById('post-text').value, file = document.getElementById('post-img').files[0];
        if(!txt.trim()) return;
        const b = document.getElementById('btn-pub'); b.disabled = true; b.innerText = "...";

        let url = null;
        if(file) {
            const name = Date.now() + "-" + file.name.replace(/\s/g, '_');
            await _sb.storage.from('images').upload(name, file);
            url = _sb.storage.from('images').getPublicUrl(name).data.publicUrl;
        }

        let city = "Anónimo";
        try { const r = await fetch('https://ipapi.co/json/'); const j = await r.json(); city = j.city; } catch(e){}

        await _sb.from('confessions').insert([{ 
            text: txt, image_url: url, city: city, author_alias: myAlias, user_id: currentUserId 
        }]);
        location.reload();
    }

    async function doLike(id) {
        await _sb.rpc('increment_likes', { post_id: id });
        const el = document.getElementById(`l-${id}`); el.innerText = parseInt(el.innerText) + 1;
    }

    function openChat(id) { activePostId = id; toggleD(true); loadReplies(id); }
    async function loadReplies(id) {
        const { data } = await _sb.from('replies').select('*').eq('confession_id', id);
        document.getElementById('replies-list').innerHTML = data.map(r => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px; font-size:0.95rem;">${r.text}</div>
        `).join('');
    }

    async function postReply() {
        const i = document.getElementById('reply-in'); if(!i.value.trim()) return;
        await _sb.from('replies').insert([{ confession_id: activePostId, text: i.value, user_id: currentUserId }]);
        i.value = ''; loadReplies(activePostId);
    }

    async function loadMyPosts() {
        const { data } = await _sb.from('confessions').select('*').eq('author_alias', myAlias);
        document.getElementById('profile-grid').innerHTML = data.map(p => `
            <div class="grid-sq">${p.image_url ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover;">` : ''}</div>
        `).join('');
    }

    function toggleM(id, s) { 
        document.getElementById('modal-'+id).style.display = s ? 'flex' : 'none'; 
        if(id==='profile' && s) loadMyPosts();
    }
    function toggleD(s) { document.getElementById('drawer-chat').classList.toggle('active', s); }
    function loginGoogle() { _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }); }

    init();
</script>
</body>
</html>
