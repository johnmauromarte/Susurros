<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurros | App Oficial</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --p: #ff0050; --bg: #000; --txt: #fff; --cyan: #25f4ee; --gray: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* NOTIFICACIONES TOAST */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 5000; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { background: #fff; color: #000; padding: 15px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; display: flex; align-items: center; gap: 12px; transform: translateY(-100px); opacity: 0; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* FEED Y CARTAS */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; background: #000; display: flex; flex-direction: column; justify-content: center; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 60%); z-index: 2; pointer-events: none; }

        /* CAPA DE TEXTO */
        .ui-layer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 3; padding: 25px 85px 140px 20px; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }
        .city-tag { font-size: 0.8rem; font-weight: 800; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase; }
        .text { font-size: 1.4rem; line-height: 1.4; text-shadow: 0 2px 10px #000; font-weight: bold; }

        /* BARRA LATERAL DE ACCIONES */
        .side-bar { position: absolute; right: 12px; bottom: 140px; z-index: 10; display: flex; flex-direction: column; gap: 18px; align-items: center; }
        .circle { width: 50px; height: 50px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        .count { font-size: 0.7rem; font-weight: bold; margin-top: 4px; color: #fff; }

        /* HILOS DE RESPUESTA (DRAWER) */
        .drawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #111; z-index: 2000; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; display: flex; flex-direction: column; }
        .drawer.active { transform: translateY(0); }
        .replies-list { flex: 1; overflow-y: auto; margin: 15px 0; }
        .reply-card { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--p); }

        /* PERFIL Y MODALES */
        #profile-view { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
        .profile-header { padding: 60px 20px 20px; text-align: center; border-bottom: 1px solid #222; }
        .google-btn { background: #fff; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer; }
        
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; width: 60px; height: 35px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.6rem; z-index: 100; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 25px; }

        /* ANIMACIÓN CORAZÓN */
        .heart-pop { position: absolute; font-size: 5rem; color: var(--p); transform: translate(-50%, -50%) scale(0); animation: pop 0.7s ease-out forwards; z-index: 5; pointer-events: none; }
        @keyframes pop { 0% { scale: 0; opacity: 1; } 40% { scale: 1.3; } 100% { scale: 1; opacity: 0; transform: translate(-50%, -120%); } }
    </style>
</head>
<body>

<div id="toast-container"></div>
<div id="feed">Cargando...</div>
<button class="fab" onclick="toggleM('pub', true)">+</button>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>Hilo de Debate</strong>
        <span onclick="toggleD(false)" style="font-size:2.5rem; color:#888; cursor:pointer;">&times;</span>
    </div>
    <div id="replies-list" class="replies-list"></div>
    <div style="display:flex; gap:10px; padding:10px 0;">
        <input type="text" id="reply-in" style="flex:1; background:#222; border:none; padding:12px; border-radius:25px; color:#fff;" placeholder="Escribe algo...">
        <button onclick="postReply()" style="color:var(--cyan); background:none; border:none; font-weight:bold;">ENVIAR</button>
    </div>
</div>

<div id="profile-view">
    <div class="profile-header">
        <div id="user-info">
            <button class="google-btn" onclick="loginGoogle()">Entrar con Google</button>
        </div>
        <button onclick="toggleP(false)" style="margin-top:20px; color:#888; background:none; border:none;">Cerrar</button>
    </div>
</div>

<div id="modal-pub" class="modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <span onclick="toggleM('pub', false)" style="color:#888">Cerrar</span>
        <button onclick="publish()" id="btn-pub" style="background:var(--p); color:#fff; border:none; padding:8px 20px; border-radius:20px; font-weight:bold;">Publicar</button>
    </div>
    <textarea id="post-text" style="width:100%; height:150px; background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:15px;" placeholder="¿Qué quieres decir?"></textarea>
    <input type="file" id="post-img" style="margin-top:20px; color:#888;">
</div>

<script>
    // CONFIGURACIÓN (Limpia y sin filtros)
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    
    const _sb = supabase.createClient(S_URL, S_KEY, { auth: { persistSession: true } });

    let activePostId = null, lastTap = 0, currentUser = null;

    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        currentUser = session?.user || null;
        updateUI();

        _sb.auth.onAuthStateChange((_e, session) => {
            currentUser = session?.user || null;
            updateUI();
        });

        // Notificaciones en vivo
        _sb.channel('global').on('postgres_changes', { event: 'INSERT', table: 'notifications' }, p => {
            showToast(p.new.message);
        }).subscribe();

        loadFeed();
    }

    function showToast(m) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = 'toast';
        t.innerHTML = `💬 ${m}`; c.appendChild(t);
        setTimeout(() => t.classList.add('show'), 100);
        setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(), 400); }, 4000);
    }

    function updateUI() {
        if (currentUser) {
            document.getElementById('user-info').innerHTML = `
                <img src="${currentUser.user_metadata.avatar_url}" style="width:60px; border-radius:50%; border:2px solid var(--p);">
                <div style="margin-top:10px;">${currentUser.user_metadata.full_name}</div>
                <button onclick="_sb.auth.signOut().then(()=>location.reload())" style="color:var(--p); background:none; border:none; font-size:0.8rem;">Salir</button>
            `;
        }
    }

    async function loginGoogle() {
        await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    }

    // CARGA DE FEED (SIN FILTRO IS_HIDDEN)
    async function loadFeed() {
        console.log("Cargando feed limpio...");
        const { data, error } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });

        if (error) {
            console.error("Error API:", error.message);
            document.getElementById('feed').innerHTML = `<div style="padding:50px;">Error: ${error.message}</div>`;
            return;
        }

        document.getElementById('feed').innerHTML = data.map(p => `
            <div class="card" onclick="handleTap(event, '${p.id}')">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img">` : ''}
                <div class="ui-layer">
                    <div class="city-tag">📍 ${p.city || 'Anónimo'}</div>
                    <div class="text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="action-btn" onclick="doLike('${p.id}')"><div class="circle">❤️</div><span class="count" id="l-${p.id}">${p.likes || 0}</span></div>
                    <div class="action-btn" onclick="openComments('${p.id}')"><div class="circle">💬</div><span class="count">Hilo</span></div>
                    <div class="action-btn" onclick="toggleP(true)"><div class="circle">👤</div><span class="count">Perfil</span></div>
                </div>
            </div>
        `).join('');
    }

    function handleTap(e, id) {
        const now = Date.now();
        if (now - lastTap < 300) {
            const h = document.createElement('div'); h.className = 'heart-pop'; h.innerHTML = '❤️';
            h.style.left = e.clientX+'px'; h.style.top = e.clientY+'px';
            document.body.appendChild(h); setTimeout(()=>h.remove(), 700);
            doLike(id);
        }
        lastTap = now;
    }

    async function doLike(id) {
        await _sb.rpc('increment_likes', { post_id: id });
        const c = document.getElementById(`l-${id}`); if(c) c.innerText = parseInt(c.innerText)+1;
    }

    async function openComments(id) { activePostId = id; toggleD(true); loadReplies(id); }
    async function loadReplies(id) {
        const { data } = await _sb.from('replies').select('*').eq('confession_id', id).order('created_at', { ascending: true });
        document.getElementById('replies-list').innerHTML = data.map(r => `
            <div class="reply-card">${r.text}</div>
        `).join('');
    }

    async function postReply() {
        const i = document.getElementById('reply-in'); if(!i.value.trim()) return;
        await _sb.from('replies').insert([{ confession_id: activePostId, text: i.value, user_id: currentUser?.id }]);
        i.value = ''; loadReplies(activePostId);
    }

    async function publish() {
        const txt = document.getElementById('post-text').value, file = document.getElementById('post-img').files[0], btn = document.getElementById('btn-pub');
        if(!txt.trim()) return; btn.innerText = "..."; btn.disabled = true;
        let url = null;
        if(file) {
            const name = `${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            await _sb.storage.from('images').upload(name, file);
            url = _sb.storage.from('images').getPublicUrl(name).data.publicUrl;
        }
        await _sb.from('confessions').insert([{ text: txt, image_url: url, city: "Anónimo", user_id: currentUser?.id }]);
        location.reload();
    }

    function toggleP(s) { document.getElementById('profile-view').style.display = s ? 'flex' : 'none'; }
    function toggleM(i, s) { document.getElementById(`modal-${i}`).style.display = s ? 'flex' : 'none'; }
    function toggleD(s) { document.getElementById('drawer').classList.toggle('active', s); }

    init();
</script>
</body>
</html>
