<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurros Pro | Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff0050; --bg: #000; --txt: #fff; --glass: rgba(255,255,255,0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* FEED */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #050505; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); z-index: 2; }

        /* TEXTO Y UI */
        .ui-layer { position: absolute; bottom: 100px; left: 20px; right: 80px; z-index: 3; pointer-events: none; }
        .text { font-size: 1.4rem; font-weight: bold; text-shadow: 0 2px 10px #000; line-height: 1.2; }

        /* BOTONES LATERALES */
        .side-bar { position: absolute; right: 15px; bottom: 120px; z-index: 10; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .circle { width: 50px; height: 50px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .count { font-size: 0.8rem; font-weight: bold; margin-top: 4px; }

        /* MODAL PUBLICAR */
        .modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 25px; }
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; width: 60px; height: 40px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.5rem; z-index: 100; cursor: pointer; }
        
        textarea { width: 100%; height: 150px; background: #111; color: #fff; border: none; padding: 15px; border-radius: 15px; font-size: 1.1rem; margin-top: 20px; outline: none; }
        .upload-btn { margin-top: 20px; background: #111; padding: 30px; border-radius: 15px; text-align: center; border: 2px dashed #333; }
    </style>
</head>
<body>

<div id="feed">Cargando...</div>

<button class="fab" onclick="toggleM(true)">+</button>

<div id="modal-pub" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span onclick="toggleM(false)" style="color:#888">Cerrar</span>
        <button onclick="publish()" id="btn-pub" style="background:var(--p); color:#fff; border:none; padding:10px 20px; border-radius:20px; font-weight:bold;">PUBLICAR</button>
    </div>
    
    <textarea id="post-text" placeholder="¿Qué estás pensando?"></textarea>
    
    <label class="upload-btn">
        <span id="img-label">📸 Toca para añadir foto</span>
        <input type="file" id="post-img" hidden accept="image/*" onchange="document.getElementById('img-label').innerText='✅ FOTO LISTA'">
    </label>
</div>

<script>
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = supabase.createClient(S_URL, S_KEY);

    // 1. CARGAR POSTS
    async function loadFeed() {
        const { data, error } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });
        if(error) return console.log("Error:", error);
        
        document.getElementById('feed').innerHTML = data.map(p => `
            <div class="card">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img" onerror="this.style.display='none'">` : ''}
                <div class="ui-layer">
                    <div style="font-size:0.7rem; color:#25f4ee; margin-bottom:5px;">📍 ${p.city || 'Local'}</div>
                    <div class="text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="circle">❤️</div>
                    <span class="count">${p.likes || 0}</span>
                    <div class="circle">💬</div>
                </div>
            </div>
        `).join('');
    }

    // 2. PUBLICAR (Ajustado a tu DB real)
    async function publish() {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-img').files[0];
        const btn = document.getElementById('btn-pub');

        if(!txt.trim()) return alert("Escribe un mensaje");
        
        btn.innerText = "Subiendo...";
        btn.disabled = true;

        try {
            let finalUrl = null;

            if(file) {
                const fileName = `f_${Date.now()}.png`;
                const { error: upError } = await _sb.storage.from('images').upload(fileName, file);
                
                if (upError) throw new Error("Error en Storage: " + upError.message);

                const { data } = _sb.storage.from('images').getPublicUrl(fileName);
                finalUrl = data.publicUrl;
            }

            // AJUSTE CLAVE: Insertamos exactamente lo que tu tabla 'confessions' pide
            const { error: insError } = await _sb.from('confessions').insert([{ 
                text: txt, 
                image_url: finalUrl,
                city: "Santo Domingo", // Agregado para cumplir con la columna city
                likes: 0              // Agregado para cumplir con la columna likes
            }]);

            if (insError) throw new Error("Error en Tabla: " + insError.message);

            location.reload();

        } catch (err) {
            alert("⚠️ " + err.message);
            btn.disabled = false;
            btn.innerText = "PUBLICAR";
        }
    }

    function toggleM(show) { document.getElementById('modal-pub').style.display = show ? 'flex' : 'none'; }

    loadFeed();
</script>
</body>
</html>
