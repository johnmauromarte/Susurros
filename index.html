<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurros | 100% Anónimo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff0050; --bg: #000; --txt: #fff; --cyan: #25f4ee; --glass: rgba(255,255,255,0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; background: #050505; display: flex; align-items: center; justify-content: center; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 5%, transparent 50%); z-index: 2; pointer-events: none; }

        .ui-layer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 3; padding: 25px 85px 140px 20px; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }
        .city-tag { font-size: 0.7rem; font-weight: 800; color: var(--cyan); margin-bottom: 5px; text-transform: uppercase; }
        .author-tag { font-size: 0.9rem; font-weight: bold; color: #aaa; margin-bottom: 8px; }
        .text { font-size: 1.5rem; line-height: 1.3; font-weight: 700; text-shadow: 0 2px 10px #000; }

        .side-bar { position: absolute; right: 12px; bottom: 140px; z-index: 10; display: flex; flex-direction: column; gap: 18px; align-items: center; }
        .circle { width: 52px; height: 52px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; cursor: pointer; }
        .count { font-size: 0.75rem; font-weight: bold; margin-top: 4px; }

        #profile-view { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
        .profile-header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid #222; }
        
        /* Selector de Avatar */
        #avatar-container { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; cursor: pointer; }
        #avatar-circle { width: 100%; height: 100%; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; overflow: hidden; border: 2px solid var(--p); }
        .edit-badge { position: absolute; bottom: 0; right: 0; background: var(--p); color: #fff; font-size: 0.7rem; padding: 4px 8px; border-radius: 10px; font-weight: bold; }

        .profile-tabs { display: flex; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #555; font-weight: bold; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--p); }
        .profile-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; position: relative; }

        .drawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #111; z-index: 5000; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
        .drawer.active { transform: translateY(0); }
        .modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 25px; }
        .fab { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: #fff; width: 65px; height: 38px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.8rem; z-index: 100; cursor: pointer; }
        
        .heart-pop { position: absolute; font-size: 5rem; transform: translate(-50%, -50%); animation: pop 0.7s ease-out forwards; z-index: 5; pointer-events: none; }
        @keyframes pop { 0% { opacity: 1; scale: 0.5; } 100% { opacity: 0; scale: 1; transform: translate(-50%, -150%); } }
    </style>
</head>
<body>

<div id="feed">Cargando...</div>
<button class="fab" onclick="toggleM('pub', true)">+</button>

<div id="profile-view">
    <div class="profile-header">
        <div id="avatar-container" onclick="document.getElementById('avatar-upload').click()">
            <div id="avatar-circle">👤</div>
            <div class="edit-badge">CAMBIAR</div>
            <input type="file" id="avatar-upload" hidden accept="image/*" onchange="changeAvatar(this)">
        </div>
        <input type="text" id="alias-input" style="background:none; border:none; color:#fff; text-align:center; font-size:1.6rem; font-weight:900; width:100%; outline:none;" placeholder="Tu Alias...">
        <p id="user-status" style="font-size: 0.8rem; color: #555; margin-top: 5px;">Modo Anónimo Activo</p>
        <button id="g-btn" style="margin-top:15px; background:var(--glass); color:#fff; padding:8px 15px; border-radius:20px; border:1px solid #333; font-size: 0.8rem;">Conectar Google (Solo para Guardar)</button>
        <br><button onclick="toggleP(false)" style="margin-top:20px; color:var(--cyan); background:none; border:none; font-weight:bold;">VOLVER AL FEED</button>
    </div>
    <div class="profile-tabs">
        <div class="tab active" id="tab-mine" onclick="changeTab('mine')">MIS POSTS</div>
        <div class="tab" id="tab-saved" onclick="changeTab('saved')">GUARDADOS</div>
    </div>
    <div id="profile-grid" class="profile-grid"></div>
</div>

<div id="modal-pub" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span onclick="toggleM('pub', false)" style="color:#888; cursor:pointer;">Cerrar</span>
        <button onclick="publish()" id="btn-pub" style="background:var(--p); color:#fff; border:none; padding:10px 25px; border-radius:25px; font-weight:bold;">PUBLICAR</button>
    </div>
    <textarea id="post-text" style="width:100%; height:200px; background:#111; color:#fff; border:none; padding:20px; border-radius:20px; font-size:1.2rem; outline:none; resize:none;" placeholder="¿Qué quieres confesar hoy?"></textarea>
    <label style="margin-top:20px; background:#111; padding:40px; border-radius:20px; text-align:center; border:2px dashed #333; display:block; cursor:pointer;">
        <span id="img-label">📸 Foto de fondo (opcional)</span>
        <input type="file" id="post-img" hidden accept="image/*" onchange="document.getElementById('img-label').innerText='✅ IMAGEN LISTA'">
    </label>
</div>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <strong>HILO</strong>
        <span onclick="toggleD(false)" style="font-size:2rem; color:#888; cursor:pointer;">&times;</span>
    </div>
    <div id="replies-list" style="flex:1; overflow-y:auto;"></div>
    <div style="display:flex; gap:10px; padding:15px 0;">
        <input type="text" id="reply-in" style="flex:1; background:#222; border:none; padding:12px; border-radius:25px; color:#fff;" placeholder="Responder...">
        <button onclick="postReply()" style="color:var(--cyan); background:none; border:none; font-weight:bold;">OK</button>
    </div>
</div>

<script>
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = supabase.createClient(S_URL, S_KEY);

    let currentUser = null, currentTab = 'mine', activePostId = null;
    let myAlias = localStorage.getItem('myAlias') || "Anon" + Math.floor(Math.random()*999);
    let myAvatar = localStorage.getItem('myAvatar') || null;

    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        currentUser = session?.user || null;

        // Cargar Alias y Avatar
        document.getElementById('alias-input').value = myAlias;
        if(myAvatar) document.getElementById('avatar-circle').innerHTML = `<img src="${myAvatar}" style="width:100%; height:100%; object-fit:cover;">`;

        document.getElementById('alias-input').onchange = (e) => {
            myAlias = e.target.value;
            localStorage.setItem('myAlias', myAlias);
        };

        _sb.auth.onAuthStateChange((_event, session) => {
            currentUser = session?.user || null;
            updateAuthUI();
        });

        updateAuthUI();
        loadFeed();
    }

    function updateAuthUI() {
        const btn = document.getElementById('g-btn');
        const status = document.getElementById('user-status');
        if(currentUser) {
            btn.innerHTML = "Cerrar Google";
            status.innerText = "Conectado como: " + currentUser.email;
            btn.onclick = async () => { await _sb.auth.signOut(); location.reload(); };
        } else {
            btn.innerHTML = "Conectar Google";
            status.innerText = "Modo Anónimo Activo (ID local)";
            btn.onclick = loginGoogle;
        }
    }

    async function loginGoogle() {
        await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
    }

    function changeAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                myAvatar = e.target.result;
                localStorage.setItem('myAvatar', myAvatar);
                document.getElementById('avatar-circle').innerHTML = `<img src="${myAvatar}" style="width:100%; height:100%; object-fit:cover;">`;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function loadFeed() {
        const { data, error } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });
        if(error) return;
        document.getElementById('feed').innerHTML = data.map(p => `
            <div class="card" ondblclick="handleDoubleTap(event, '${p.id}')">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img">` : ''}
                <div class="ui-layer">
                    <div class="city-tag">📍 Santo Domingo</div>
                    <div class="author-tag">@${p.author_alias || 'Anon'}</div>
                    <div class="text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="circle" onclick="doLike('${p.id}')">❤️</div><span class="count" id="l-${p.id}">${p.likes || 0}</span>
                    <div class="circle" onclick="openComments('${p.id}')">💬</div>
                    <div class="circle" onclick="savePost('${p.id}')">🔖</div>
                    <div class="circle" onclick="toggleP(true)">👤</div>
                </div>
            </div>
        `).join('');
    }

    async function publish() {
        const txt = document.getElementById('post-text').value, file = document.getElementById('post-img').files[0];
        const btn = document.getElementById('btn-pub');
        if(!txt.trim()) return;
        
        btn.innerText = "Subiendo..."; btn.disabled = true;
        let url = null;

        try {
            if(file) {
                const name = `f_${Date.now()}.png`;
                await _sb.storage.from('images').upload(name, file);
                url = `${S_URL}/storage/v1/object/public/images/${name}`;
            }

            await _sb.from('confessions').insert([{ 
                text: txt, image_url: url, author_alias: myAlias, likes: 0, user_id: currentUser?.id || 'anon'
            }]);
            location.reload();
        } catch(e) {
            btn.innerText = "PUBLICAR"; btn.disabled = false;
        }
    }

    async function doLike(id) {
        const c = document.getElementById(`l-${id}`);
        const n = parseInt(c.innerText) + 1;
        c.innerText = n;
        await _sb.from('confessions').update({ likes: n }).eq('id', id);
    }

    function handleDoubleTap(e, id) {
        const h = document.createElement('div'); h.className = 'heart-pop'; h.innerHTML = '❤️';
        h.style.left = e.clientX+'px'; h.style.top = e.clientY+'px';
        document.body.appendChild(h); setTimeout(()=>h.remove(), 700); doLike(id);
    }

    async function openComments(id) { activePostId = id; toggleD(true); loadReplies(id); }
    async function loadReplies(id) {
        const { data } = await _sb.from('replies').select('*').eq('confession_id', id);
        document.getElementById('replies-list').innerHTML = data.map(r => `<div style="background:#222; padding:12px; border-radius:15px; margin-bottom:10px; border-left:3px solid var(--p);">${r.text}</div>`).join('');
    }

    async function postReply() {
        const i = document.getElementById('reply-in'); if(!i.value.trim()) return;
        await _sb.from('replies').insert([{ confession_id: activePostId, text: i.value, user_id: currentUser?.id || 'anon' }]);
        i.value = ''; loadReplies(activePostId);
    }

    async function savePost(id) {
        if(!currentUser) return alert("Inicia sesión con Google para guardar permanentemente.");
        await _sb.from('bookmarks').insert([{ confession_id: id, user_id: currentUser.id }]);
        alert("¡Guardado!");
    }

    async function loadProfileData() {
        const grid = document.getElementById('profile-grid');
        grid.innerHTML = '<div style="padding:20px;">Cargando...</div>';
        if(currentTab === 'mine') {
            // Buscamos por Alias para mantener el anonimato total
            const { data } = await _sb.from('confessions').select('*').eq('author_alias', myAlias);
            renderGrid(data);
        } else {
            if(!currentUser) return grid.innerHTML = '<p style="padding:20px;">Inicia sesión para ver tus guardados.</p>';
            const { data } = await _sb.from('bookmarks').select('confessions(*)').eq('user_id', currentUser.id);
            renderGrid(data ? data.map(b => b.confessions) : []);
        }
    }

    function renderGrid(posts) {
        const grid = document.getElementById('profile-grid');
        if(!posts || posts.length === 0) return grid.innerHTML = '<p style="padding:20px;">Nada por aquí.</p>';
        grid.innerHTML = posts.map(p => `<div class="grid-item">${p.image_url ? `<img src="${p.image_url}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="padding:10px; font-size:9px; color:#444;">${p.text}</div>`}</div>`).join('');
    }

    function toggleD(s) { document.getElementById('drawer').classList.toggle('active', s); }
    function toggleM(i, s) { document.getElementById(`modal-${i}`).style.display = s ? 'flex' : 'none'; }
    function toggleP(s) { document.getElementById('profile-view').style.display = s ? 'flex' : 'none'; if(s) loadProfileData(); }
    function changeTab(t) {
        currentTab = t;
        document.getElementById('tab-mine').className = t === 'mine' ? 'tab active' : 'tab';
        document.getElementById('tab-saved').className = t === 'saved' ? 'tab active' : 'tab';
        loadProfileData();
    }

    init();
</script>
</body>
</html>
