<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Susurros | Ultra App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff0050; --bg: #000; --txt: #fff; --cyan: #25f4ee; --glass: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        /* FEED TIKTOK STYLE */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        #feed::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.7; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 60%); z-index: 2; }

        /* UI LAYER */
        .ui-layer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 3; padding: 30px 80px 140px 25px; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }
        .city-tag { font-size: 0.75rem; font-weight: 800; color: var(--cyan); text-transform: uppercase; margin-bottom: 10px; }
        .text { font-size: 1.6rem; font-weight: 700; line-height: 1.2; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }

        /* SIDEBAR */
        .side-bar { position: absolute; right: 15px; bottom: 140px; z-index: 10; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .circle { width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .circle:active { transform: scale(0.9); }
        .count { font-size: 0.7rem; font-weight: bold; color: #ccc; margin-top: 4px; }

        /* PERFIL & MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: none; flex-direction: column; padding: 25px; backdrop-filter: blur(20px); }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex: 1; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        .fab { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 65px; height: 40px; background: #fff; border-radius: 12px; z-index: 100; border: none; font-size: 1.8rem; font-weight: bold; box-shadow: 0 5px 20px rgba(255,255,255,0.2); cursor: pointer; }
        
        textarea { width: 100%; height: 200px; background: transparent; border: none; color: #fff; font-size: 1.4rem; outline: none; resize: none; }
    </style>
</head>
<body>

<div id="feed">Cargando...</div>
<button class="fab" onclick="toggleM('pub', true)">+</button>

<div id="modal-pub" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <span onclick="toggleM('pub', false)" style="color:#666">Cerrar</span>
        <button onclick="publish()" id="btn-pub" style="background:var(--p); color:#fff; border:none; padding:10px 25px; border-radius:25px; font-weight:bold;">Publicar</button>
    </div>
    <textarea id="post-text" placeholder="¿Cuál es tu secreto?"></textarea>
    <label style="background:#111; padding:30px; border-radius:20px; text-align:center; border:1px dashed #333; cursor:pointer;">
        <span id="img-label">📸 Seleccionar Imagen</span>
        <input type="file" id="post-img" hidden accept="image/*" onchange="document.getElementById('img-label').innerText='✅ Imagen Seleccionada'">
    </label>
</div>

<div id="modal-profile" class="modal">
    <div style="text-align:center; padding:40px 0;">
        <div id="p-avatar" style="width:80px; height:80px; background:linear-gradient(45deg, var(--p), var(--cyan)); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:2rem;">👤</div>
        <input type="text" id="alias-input" style="background:none; border:none; color:#fff; text-align:center; font-size:1.5rem; font-weight:900; width:100%;" placeholder="Tu Alias">
        <button onclick="loginGoogle()" id="g-btn" style="margin-top:15px; background:#fff; color:#000; border:none; padding:8px 20px; border-radius:20px; font-weight:bold; font-size:0.8rem;">Vincular Google</button>
    </div>
    <div style="display:flex; border-bottom:1px solid #222; margin-bottom:2px;">
        <div class="tab" style="flex:1; text-align:center; padding:15px; border-bottom:2px solid var(--p);">MIS POSTS</div>
    </div>
    <div id="profile-grid" class="profile-grid"></div>
    <button onclick="toggleM('profile', false)" style="padding:20px; color:#555; background:none; border:none;">Cerrar</button>
</div>

<script>
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = supabase.createClient(S_URL, S_KEY);

    let currentUser = null;
    let myAlias = localStorage.getItem('myAlias') || "Anónimo_" + Math.floor(Math.random()*999);

    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        currentUser = session?.user || null;
        document.getElementById('alias-input').value = myAlias;
        
        if(currentUser) {
            document.getElementById('g-btn').innerText = "Cerrar Sesión";
            document.getElementById('g-btn').onclick = () => _sb.auth.signOut().then(()=>location.reload());
            if(currentUser.user_metadata.avatar_url) {
                document.getElementById('p-avatar').innerHTML = `<img src="${currentUser.user_metadata.avatar_url}" style="width:100%;height:100%;border-radius:50%;">`;
            }
        }

        document.getElementById('alias-input').onchange = (e) => {
            myAlias = e.target.value;
            localStorage.setItem('myAlias', myAlias);
        };

        loadFeed();
    }

    async function loadFeed() {
        const { data, error } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });
        if(error) return;

        document.getElementById('feed').innerHTML = data.map(p => `
            <div class="card">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img" loading="lazy">` : ''}
                <div class="ui-layer">
                    <div class="city-tag">📍 ${p.city || 'Cerca de ti'}</div>
                    <div class="text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="circle" onclick="doLike('${p.id}')">❤️</div><span class="count" id="l-${p.id}">${p.likes || 0}</span>
                    <div class="circle" onclick="toggleM('profile', true)">👤</div><span class="count">Perfil</span>
                </div>
            </div>
        `).join('');
    }

    async function publish() {
        const txt = document.getElementById('post-text').value;
        const file = document.getElementById('post-img').files[0];
        const btn = document.getElementById('btn-pub');

        if(!txt.trim()) return alert("¡Escribe un susurro!");
        btn.innerText = "Subiendo...";
        btn.disabled = true;

        let url = null;
        if(file) {
            const fileName = Date.now() + "-" + file.name.replace(/\s/g, '_');
            const { error: upError } = await _sb.storage.from('images').upload(fileName, file);
            
            if(upError) {
                alert("Error al subir imagen al Storage: " + upError.message);
            } else {
                const { data } = _sb.storage.from('images').getPublicUrl(fileName);
                url = data.publicUrl;
            }
        }

        let city = "Anónimo";
        try { const r = await fetch('https://ipapi.co/json/'); const j = await r.json(); city = j.city; } catch(e){}

        const { error: insError } = await _sb.from('confessions').insert([{ 
            text: txt, image_url: url, city: city, author_alias: myAlias, user_id: currentUser?.id 
        }]);

        if(insError) {
            alert("Error al guardar en base de datos: " + insError.message);
            btn.disabled = false; btn.innerText = "Publicar";
        } else {
            location.reload();
        }
    }

    async function loadMyPosts() {
        const { data } = await _sb.from('confessions').select('*').eq('author_alias', myAlias).order('created_at', {ascending: false});
        document.getElementById('profile-grid').innerHTML = data.map(p => `
            <div class="grid-item">
                ${p.image_url ? `<img src="${p.image_url}">` : `<div style="padding:5px; font-size:0.6rem;">${p.text}</div>`}
            </div>
        `).join('');
    }

    async function doLike(id) {
        await _sb.rpc('increment_likes', { post_id: id });
        const c = document.getElementById(`l-${id}`); if(c) c.innerText = parseInt(c.innerText)+1;
    }

    function toggleM(id, s) { 
        document.getElementById('modal-'+id).style.display = s ? 'flex' : 'none'; 
        if(id === 'profile' && s) loadMyPosts();
    }

    function loginGoogle() { _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }); }

    init();
</script>
</body>
</html>
