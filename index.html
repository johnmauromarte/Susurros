<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Susurros | Ultra Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --p: #ff0050; --bg: #000; --txt: #fff; --cyan: #25f4ee; 
            --glass: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--txt); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; position: fixed; width: 100%; height: 100%; 
        }

        /* --- FEED ENGINE --- */
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        #feed::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.5; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 50%); z-index: 2; }

        /* --- UI OVERLAY --- */
        .ui-layer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 3; padding: 30px 90px 140px 25px; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }
        .author-info { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .city-badge { background: var(--glass); backdrop-filter: blur(10px); padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; color: var(--cyan); border: 1px solid rgba(255,255,255,0.1); }
        .post-text { font-size: 1.6rem; font-weight: 800; line-height: 1.2; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* --- SIDE ACTIONS --- */
        .side-bar { position: absolute; right: 15px; bottom: 140px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }
        .btn-action { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .btn-action:active { transform: scale(0.9); }
        .icon-circle { width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; }
        .count-label { font-size: 0.75rem; font-weight: 700; color: #eee; }

        /* --- PERFIL MODAL (PERFECCIONADO) --- */
        #modal-profile { 
            position: fixed; inset: 0; z-index: 4000; display: none; flex-direction: column; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(30px); padding-top: var(--safe-top); 
        }
        .profile-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .profile-header { padding: 40px 20px 20px; text-align: center; }
        .avatar-main { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(45deg, var(--p), var(--cyan)); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 3px solid #000; box-shadow: 0 0 20px rgba(255,0,80,0.3); }
        #alias-display { background: none; border: none; color: #fff; font-size: 1.6rem; font-weight: 900; text-align: center; width: 100%; outline: none; margin-bottom: 5px; }
        
        .stats-row { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: 800; }
        .stat-lab { font-size: 0.7rem; color: #666; text-transform: uppercase; }

        .profile-tabs { display: flex; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-size: 0.8rem; font-weight: 800; color: #444; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #fff; border-bottom-color: var(--p); }
        
        .grid-container { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; padding-bottom: 50px; }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- UTILS --- */
        .fab { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 65px; height: 40px; background: #fff; border-radius: 12px; z-index: 100; border: none; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(255,255,255,0.2); }
        .modal-full { position: fixed; inset: 0; z-index: 5000; background: #000; display: none; flex-direction: column; padding: 30px 20px; }
    </style>
</head>
<body>

<div id="feed"></div>
<button class="fab" onclick="toggleView('pub', true)">+</button>

<div id="modal-profile">
    <div class="profile-content">
        <div style="padding: 20px; display: flex; justify-content: space-between;">
            <span onclick="toggleView('profile', false)" style="font-weight: 800; color: #555;">Cerrar</span>
            <span onclick="loginGoogle()" id="auth-label" style="color: var(--cyan); font-weight: 800; font-size: 0.8rem;">Vincular Google</span>
        </div>
        
        <div class="profile-header">
            <div class="avatar-main">👤</div>
            <input type="text" id="alias-display" placeholder="Escribe tu alias...">
            <p style="font-size: 0.7rem; color: #444;">Toca para editar tu nombre anónimo</p>
            
            <div class="stats-row">
                <div class="stat-item"><span class="stat-val" id="count-mine">0</span><span class="stat-lab">Susurros</span></div>
                <div class="stat-item"><span class="stat-val" id="count-karma">0</span><span class="stat-lab">Karma</span></div>
            </div>
        </div>

        <div class="profile-tabs">
            <div class="tab-btn active" id="tab-posts" onclick="setTab('posts')">MIS POSTS</div>
            <div class="tab-btn" id="tab-saved" onclick="setTab('saved')">GUARDADOS</div>
        </div>
        <div id="profile-grid" class="grid-container"></div>
    </div>
</div>

<div id="modal-pub" class="modal-full">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <span onclick="toggleView('pub', false)" style="color:#555">Cancelar</span>
        <button onclick="publish()" id="btn-pub" style="background:var(--p); color:#fff; border:none; padding:10px 25px; border-radius:25px; font-weight:800;">PUBLICAR</button>
    </div>
    <textarea id="post-text" style="background:transparent; border:none; color:#fff; font-size:1.5rem; flex:1; outline:none; resize:none;" placeholder="¿Qué estás pensando...?"></textarea>
    <div style="padding:20px 0;">
        <label style="background: #111; padding: 15px; border-radius: 15px; display: block; text-align: center;">
            <span id="img-status">📸 Añadir imagen de fondo</span>
            <input type="file" id="post-img" hidden accept="image/*" onchange="document.getElementById('img-status').innerText='✅ Imagen lista'">
        </label>
    </div>
</div>

<script>
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = supabase.createClient(S_URL, S_KEY);

    let userSession = null, currentTab = 'posts';
    let myAlias = localStorage.getItem('myAlias') || "Anónimo_" + Math.floor(Math.random()*999);

    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        userSession = session?.user || null;
        
        const aliasInp = document.getElementById('alias-display');
        aliasInp.value = myAlias;
        aliasInp.onchange = (e) => {
            myAlias = e.target.value;
            localStorage.setItem('myAlias', myAlias);
        };

        if(userSession) document.getElementById('auth-label').innerText = "CUENTA VINCULADA";
        
        loadFeed();
    }

    async function loadFeed() {
        const { data, error } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });
        if(error) return;
        document.getElementById('feed').innerHTML = data.map(p => `
            <div class="card">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img" loading="lazy">` : ''}
                <div class="ui-layer">
                    <div class="author-info">
                        <span style="font-weight:900;">@${p.author_alias || 'Anónimo'}</span>
                        <span class="city-badge">📍 ${p.city || 'Cerca'}</span>
                    </div>
                    <div class="post-text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="btn-action" onclick="doLike('${p.id}')">
                        <div class="icon-circle">❤️</div>
                        <span class="count-label" id="l-${p.id}">${p.likes || 0}</span>
                    </div>
                    <div class="btn-action" onclick="toggleM('profile', true)">
                        <div class="icon-circle">👤</div>
                        <span class="count-label">Perfil</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // --- PERFIL OPTIMIZADO ---
    function setTab(t) {
        currentTab = t;
        document.getElementById('tab-posts').classList.toggle('active', t === 'posts');
        document.getElementById('tab-saved').classList.toggle('active', t === 'saved');
        refreshProfileGrid();
    }

    async function refreshProfileGrid() {
        const grid = document.getElementById('profile-grid');
        grid.innerHTML = '<div style="padding:20px;">...</div>';
        
        try {
            let posts = [];
            if(currentTab === 'posts') {
                const { data } = await _sb.from('confessions').select('*').eq('author_alias', myAlias);
                posts = data || [];
                document.getElementById('count-mine').innerText = posts.length;
            } else {
                if(!userSession) { grid.innerHTML = '<p style="grid-column:1/4; padding:40px; text-align:center; color:#444;">Inicia sesión para guardar.</p>'; return; }
                const { data } = await _sb.from('bookmarks').select('confessions(*)').eq('user_id', userSession.id);
                posts = data ? data.map(d => d.confessions) : [];
            }

            if(posts.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/4; padding:40px; text-align:center; color:#333;">No hay nada aquí.</p>';
            } else {
                grid.innerHTML = posts.map(p => `
                    <div class="grid-item">
                        ${p.image_url ? `<img src="${p.image_url}">` : `<div style="padding:5px; font-size:7px; color:#333;">${p.text}</div>`}
                    </div>
                `).join('');
            }
        } catch(e) { console.error(e); grid.innerHTML = 'Error de carga'; }
    }

    // --- ACCIONES CORE ---
    async function publish() {
        const txt = document.getElementById('post-text').value, file = document.getElementById('post-img').files[0];
        if(!txt.trim()) return;
        const btn = document.getElementById('btn-pub'); btn.innerText = "..."; btn.disabled = true;

        let url = null;
        if(file) {
            const name = `img-${Date.now()}`;
            await _sb.storage.from('images').upload(name, file);
            url = _sb.storage.from('images').getPublicUrl(name).data.publicUrl;
        }

        let city = "Anónimo";
        try { const r = await fetch('https://ipapi.co/json/'); const j = await r.json(); city = j.city || "Anónimo"; } catch(e){}

        await _sb.from('confessions').insert([{ 
            text: txt, image_url: url, city: city, author_alias: myAlias, user_id: userSession?.id 
        }]);
        location.reload();
    }

    async function doLike(id) {
        await _sb.rpc('increment_likes', { post_id: id });
        const l = document.getElementById(`l-${id}`); if(l) l.innerText = parseInt(l.innerText) + 1;
    }

    function toggleView(view, show) {
        document.getElementById('modal-' + view).style.display = show ? 'flex' : 'none';
        if(view === 'profile' && show) refreshProfileGrid();
    }

    function loginGoogle() { _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }); }

    init();
</script>
</body>
</html>
