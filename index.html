<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurros | Social App Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --p: #ff0050; --bg: #000; --txt: #fff; --cyan: #25f4ee; --glass: rgba(255,255,255,0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; overflow: hidden; background: #050505; display: flex; align-items: center; justify-content: center; }
        .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 5%, transparent 50%); z-index: 2; pointer-events: none; }

        .ui-layer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 3; padding: 25px 85px 140px 20px; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }
        .city-tag { font-size: 0.7rem; font-weight: 800; color: var(--cyan); margin-bottom: 5px; text-transform: uppercase; }
        .author-tag { font-size: 0.9rem; font-weight: bold; color: #aaa; margin-bottom: 8px; }
        .text { font-size: 1.5rem; line-height: 1.3; font-weight: 700; text-shadow: 0 2px 10px #000; }

        .side-bar { position: absolute; right: 12px; bottom: 140px; z-index: 10; display: flex; flex-direction: column; gap: 18px; align-items: center; }
        .circle { width: 52px; height: 52px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; cursor: pointer; }
        .circle:active { transform: scale(0.9); }
        .count { font-size: 0.75rem; font-weight: bold; margin-top: 4px; }

        #profile-view { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
        .profile-header { padding: 60px 20px 20px; text-align: center; border-bottom: 1px solid #222; }
        .profile-tabs { display: flex; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #555; font-weight: bold; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--p); }
        .profile-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; position: relative; cursor: pointer; }
        .grid-img { width: 100%; height: 100%; object-fit: cover; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding: 25px; overflow-y: auto; }
        .fab { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: #fff; width: 65px; height: 38px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.8rem; z-index: 100; cursor: pointer; }
        
        .drawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #111; z-index: 5000; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.3s; padding: 20px; display: flex; flex-direction: column; }
        .drawer.active { transform: translateY(0); }

        #read-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .read-content { background: #111; border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid #333; }
        
        .heart-pop { position: absolute; font-size: 5rem; transform: translate(-50%, -50%); animation: pop 0.7s ease-out forwards; z-index: 5; pointer-events: none; }
        @keyframes pop { 0% { opacity: 1; scale: 0.5; } 50% { scale: 1.2; } 100% { opacity: 0; scale: 1; transform: translate(-50%, -150%); } }

        /* Árbol de comentarios */
        .reply-item { background:#222; padding:12px; border-radius:15px; margin-bottom:8px; border-left:3px solid var(--p); font-size:0.9rem; }
        .reply-btn { background:none; border:none; color:var(--cyan); font-size:0.7rem; font-weight:bold; cursor:pointer; margin-top:5px; text-transform:uppercase; }
        #reply-status { display:none; background:var(--p); color:white; font-size:0.7rem; padding:4px 10px; border-radius:10px; margin-bottom:5px; justify-content:space-between; align-items:center; }

        /* Buscador de música */
        #music-results { background: #111; border-radius: 15px; margin-top: 10px; max-height: 150px; overflow-y: auto; display: none; border: 1px solid #333; }
        .music-item { padding: 10px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .music-item img { width: 35px; height: 35px; border-radius: 5px; }
        #selected-music-tag { display: none; background: var(--cyan); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 10px; }
        #yt-player { position: absolute; top: -1000px; left: -1000px; }
    </style>
</head>
<body>

<div id="yt-player"></div>
<div id="feed">Cargando...</div>
<button class="fab" onclick="toggleM('pub', true)">+</button>

<div id="profile-view">
    <div class="profile-header">
        <div id="avatar-circle" style="width:80px; height:80px; background:var(--p); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; overflow:hidden;">👤</div>
        <input type="text" id="alias-input" style="background:none; border:none; color:#fff; text-align:center; font-size:1.6rem; font-weight:900; width:100%; outline:none;" placeholder="Tu Alias...">
        <button id="g-btn" style="margin-top:15px; background:#fff; color:#000; padding:10px 20px; border-radius:25px; border:none; font-weight:bold;">Conectar Google</button>
        <br><button onclick="toggleP(false)" style="margin-top:25px; color:#888; background:none; border:none; font-size:0.9rem;">Volver al Feed</button>
    </div>
    <div class="profile-tabs">
        <div class="tab active" id="tab-mine" onclick="changeTab('mine')">MIS POSTS</div>
        <div class="tab" id="tab-saved" onclick="changeTab('saved')">GUARDADOS</div>
    </div>
    <div id="profile-grid" class="profile-grid"></div>
</div>

<div id="drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <strong>Debate infinito</strong>
        <span onclick="toggleD(false)" style="font-size:2rem; color:#888; cursor:pointer;">&times;</span>
    </div>
    <div id="replies-list" style="flex:1; overflow-y:auto; padding-right: 5px;"></div>
    <div id="reply-status">
        <span>Respondiendo...</span>
        <span onclick="cancelReply()" style="cursor:pointer; font-weight:900;">X</span>
    </div>
    <div style="display:flex; gap:10px; padding:15px 0; border-top: 1px solid #222;">
        <input type="text" id="reply-in" style="flex:1; background:#222; border:none; padding:12px; border-radius:25px; color:#fff;" placeholder="Añadir respuesta...">
        <button onclick="postReply()" style="color:var(--cyan); background:none; border:none; font-weight:bold;">OK</button>
    </div>
</div>

<div id="modal-pub" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span onclick="toggleM('pub', false)" style="color:#888; cursor:pointer;">Cerrar</span>
        <button onclick="publish()" id="btn-pub" style="background:var(--p); color:#fff; border:none; padding:10px 25px; border-radius:25px; font-weight:bold;">PUBLICAR</button>
    </div>
    <textarea id="post-text" style="width:100%; height:120px; background:#111; color:#fff; border:none; padding:20px; border-radius:20px; font-size:1.2rem; outline:none; resize:none;" placeholder="Tu secreto..."></textarea>
    
    <div style="margin-top:10px;">
        <div style="display:flex; gap:10px;">
            <input type="text" id="music-search" style="flex:1; background:#222; border:none; padding:12px; border-radius:15px; color:#fff; font-size:0.8rem;" placeholder="🔍 Buscar música...">
            <button onclick="searchMusic()" style="background:var(--cyan); border:none; padding:0 12px; border-radius:15px; font-weight:bold; font-size:0.7rem;">BUSCAR</button>
        </div>
        <div id="selected-music-tag"></div>
        <div id="music-results"></div>
    </div>

    <label style="margin-top:15px; background:#111; padding:25px; border-radius:20px; text-align:center; border:2px dashed #333; display:block; cursor:pointer;">
        <span id="img-label">📸 Foto de fondo</span>
        <input type="file" id="post-img" hidden accept="image/*" onchange="document.getElementById('img-label').innerText='✅ FOTO LISTA'">
    </label>
</div>

<div id="read-modal" onclick="this.style.display='none'">
    <div class="read-content" id="read-box" onclick="event.stopPropagation()">
        <p id="read-text" style="font-size:1.3rem; margin-bottom:20px;"></p>
        <button onclick="document.getElementById('read-modal').style.display='none'" style="width:100%; padding:12px; border-radius:15px; border:none; background:var(--p); color:#fff; font-weight:bold;">CERRAR</button>
    </div>
</div>

<script>
    const S_URL = "https://xylesaqkvgvidyfjmfod.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bGVzYXFrdmd2aWR5ZmptZm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzgyMDksImV4cCI6MjA5MTA1NDIwOX0.XjcFRTrUn8yVQ7-_g9kUgV4XnuE4RR4F_NMsxeMbS5E";
    const _sb = supabase.createClient(S_URL, S_KEY);

    let activePostId = null, currentUser = null, currentTab = 'mine', activeParentId = null, player = null, selectedVideoId = null;
    let myAlias = localStorage.getItem('myAlias') || "Anon" + Math.floor(Math.random()*999);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1 },
            events: { 'onReady': (e) => e.target.mute() }
        });
    }

    async function init() {
        const { data: { session } } = await _sb.auth.getSession();
        currentUser = session?.user || null;
        document.getElementById('alias-input').value = myAlias;
        document.getElementById('alias-input').onchange = (e) => { myAlias = e.target.value; localStorage.setItem('myAlias', myAlias); };
        _sb.auth.onAuthStateChange((_event, session) => { currentUser = session?.user || null; updateUserUI(); });
        updateUserUI(); loadFeed();
        document.getElementById('feed').addEventListener('scroll', debounce(checkScroll, 150));
    }

    function updateUserUI() {
        const btn = document.getElementById('g-btn');
        if(currentUser) {
            const avatar = currentUser.user_metadata.avatar_url;
            if(avatar) document.getElementById('avatar-circle').innerHTML = `<img src="${avatar}" style="width:100%; height:100%; object-fit:cover;">`;
            btn.innerHTML = "Cerrar Sesión";
            btn.onclick = async () => { await _sb.auth.signOut(); location.reload(); };
        } else { btn.innerHTML = "Conectar Google"; btn.onclick = loginGoogle; }
    }

    async function loginGoogle() { const cleanURL = window.location.origin + window.location.pathname; await _sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: cleanURL } }); }

    async function loadFeed() {
        const { data, error } = await _sb.from('confessions').select('*').order('created_at', { ascending: false });
        if(error) return;
        document.getElementById('feed').innerHTML = data.map(p => `
            <div class="card" data-music="${p.music_url || ''}" ondblclick="handleDoubleTap(event, '${p.id}')">
                ${p.image_url ? `<img src="${p.image_url}" class="bg-img" onerror="this.style.display='none'">` : ''}
                <div class="ui-layer">
                    <div class="city-tag">📍 ${p.city || 'Local'} ${p.music_url ? '🎵' : ''}</div>
                    <div class="author-tag">@${p.author_alias || 'Anon'}</div>
                    <div class="text">${p.text}</div>
                </div>
                <div class="side-bar">
                    <div class="circle" onclick="doLike('${p.id}')">❤️</div><span class="count" id="l-${p.id}">${p.likes || 0}</span>
                    <div class="circle" onclick="openComments('${p.id}')">💬</div><span class="count">Hilo</span>
                    <div class="circle" onclick="sharePost('${p.text}')">🔗</div><span class="count">Enviar</span>
                    <div class="circle" onclick="savePost('${p.id}')">🔖</div><span class="count">Save</span>
                    <div class="circle" onclick="toggleP(true)">👤</div><span class="count">Perfil</span>
                </div>
            </div>
        `).join('');
    }

    function checkScroll() {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            if (rect.top >= 0 && rect.top < window.innerHeight / 2) {
                const vid = card.getAttribute('data-music');
                if(vid && player && player.loadVideoById) {
                    player.loadVideoById(vid); player.unMute(); player.playVideo();
                } else if(player && player.stopVideo) { player.stopVideo(); }
            }
        });
    }

    async function searchMusic() {
        const query = document.getElementById('music-search').value;
        if(!query) return;
        const resDiv = document.getElementById('music-results');
        resDiv.style.display = 'block'; resDiv.innerHTML = '<div style="padding:10px;">...</div>';
        try {
            const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_videos`);
            const data = await response.json();
            resDiv.innerHTML = data.items.map(i => `
                <div class="music-item" onclick="selectMusic('${i.url.split('=')[1]}', '${i.title.replace(/'/g, "")}')">
                    <img src="${i.thumbnail}"><div>${i.title.substring(0,30)}</div>
                </div>
            `).join('');
        } catch (e) { resDiv.innerHTML = '<div style="padding:10px;">Error</div>'; }
    }

    function selectMusic(id, title) {
        selectedVideoId = id;
        document.getElementById('music-results').style.display = 'none';
        const tag = document.getElementById('selected-music-tag');
        tag.innerText = `🎵 ${title}`; tag.style.display = 'inline-block';
    }

    async function publish() {
        const txt = document.getElementById('post-text').value, file = document.getElementById('post-img').files[0];
        const btn = document.getElementById('btn-pub');
        if(!txt.trim()) return;
        btn.innerText = "Subiendo..."; btn.disabled = true;
        let url = null;
        try {
            if(file) {
                const name = `f_${Date.now()}.png`;
                await _sb.storage.from('images').upload(name, file);
                url = `${S_URL}/storage/v1/object/public/images/${name}`;
            }
            await _sb.from('confessions').insert([{ 
                text: txt, image_url: url, music_url: selectedVideoId, city: "Santo Domingo", 
                author_alias: myAlias, likes: 0, user_id: currentUser?.id 
            }]);
            location.reload();
        } catch(e) { btn.innerText = "PUBLICAR"; btn.disabled = false; }
    }

    async function openComments(id) { activePostId = id; cancelReply(); toggleD(true); loadReplies(id); }
    
    async function loadReplies(id) {
        const { data } = await _sb.from('replies').select('*').eq('confession_id', id).order('created_at', {ascending: true});
        if(!data) return;
        const container = document.getElementById('replies-list');
        const map = {};
        data.forEach(r => map[r.id] = { ...r, children: [] });
        const tree = [];
        data.forEach(r => {
            if (r.parent_id && map[r.parent_id]) map[r.parent_id].children.push(map[r.id]);
            else tree.push(map[r.id]);
        });
        const renderTree = (nodes, level = 0) => nodes.map(n => `
            <div class="reply-item" style="margin-left: ${level * 15}px;">
                <div>${n.text}</div>
                <button class="reply-btn" onclick="setReply('${n.id}')">Responder</button>
                ${n.children.length > 0 ? renderTree(n.children, level + 1) : ''}
            </div>
        `).join('');
        container.innerHTML = renderTree(tree);
    }

    function setReply(id) { activeParentId = id; document.getElementById('reply-status').style.display = 'flex'; document.getElementById('reply-in').focus(); }
    function cancelReply() { activeParentId = null; document.getElementById('reply-status').style.display = 'none'; }

    async function postReply() {
        const i = document.getElementById('reply-in'); if(!i.value.trim()) return;
        await _sb.from('replies').insert([{ confession_id: activePostId, parent_id: activeParentId, text: i.value, user_id: currentUser?.id }]);
        i.value = ''; cancelReply(); loadReplies(activePostId);
    }

    async function doLike(id) {
        const c = document.getElementById(`l-${id}`); const nextLikes = parseInt(c.innerText) + 1;
        c.innerText = nextLikes; await _sb.from('confessions').update({ likes: nextLikes }).eq('id', id);
    }

    function handleDoubleTap(e, id) {
        const h = document.createElement('div'); h.className = 'heart-pop'; h.innerHTML = '❤️';
        h.style.left = e.clientX+'px'; h.style.top = e.clientY+'px';
        document.body.appendChild(h); setTimeout(()=>h.remove(), 700); doLike(id);
    }

    async function sharePost(txt) {
        if (navigator.share) navigator.share({ title: 'Susurro', text: txt, url: window.location.href });
        else { navigator.clipboard.writeText(txt + " - " + window.location.href); alert("Copiado"); }
    }

    async function savePost(id) {
        if(!currentUser) return alert("Conecta Google");
        await _sb.from('bookmarks').insert([{ confession_id: id, user_id: currentUser.id }]);
        alert("Guardado 🔖");
    }

    function toggleD(s) { document.getElementById('drawer').classList.toggle('active', s); }
    function toggleM(i, s) { document.getElementById(`modal-${i}`).style.display = s ? 'flex' : 'none'; }
    function toggleP(s) { document.getElementById('profile-view').style.display = s ? 'flex' : 'none'; if(s) loadProfileData(); }
    function debounce(f, w) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => f.apply(this, args), w); }; }

    async function changeTab(t) {
        currentTab = t;
        document.getElementById('tab-mine').className = t === 'mine' ? 'tab active' : 'tab';
        document.getElementById('tab-saved').className = t === 'saved' ? 'tab active' : 'tab';
        loadProfileData();
    }

    async function loadProfileData() {
        const grid = document.getElementById('profile-grid'); grid.innerHTML = '<div style="padding:20px;">...</div>';
        if(currentTab === 'mine') {
            let q = _sb.from('confessions').select('*').order('created_at', {ascending: false});
            if(currentUser) q = q.eq('user_id', currentUser.id); else q = q.eq('author_alias', myAlias);
            const { data } = await q; renderGrid(data);
        } else {
            if(!currentUser) return grid.innerHTML = 'Conecta Google';
            const { data } = await _sb.from('bookmarks').select('confessions(*)').eq('user_id', currentUser.id);
            renderGrid(data ? data.map(b => b.confessions) : []);
        }
    }

    function renderGrid(posts) {
        const grid = document.getElementById('profile-grid');
        if(!posts || posts.length === 0) return grid.innerHTML = 'Vacío';
        grid.innerHTML = posts.map(p => `<div class="grid-item" onclick="openFullPost('${p.text.replace(/'/g, "\\'")}')">${p.image_url ? `<img src="${p.image_url}" class="grid-img">` : `<div style="font-size:8px;">${p.text}</div>`}</div>`).join('');
    }

    init();
</script>
</body>
</html>
